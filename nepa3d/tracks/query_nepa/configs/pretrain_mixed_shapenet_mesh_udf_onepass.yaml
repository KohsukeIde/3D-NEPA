# ShapeNet mesh + ShapeNet UDF one-pass corpus (no replacement sampling).
# One epoch consumes each mixed index at most once.
#
# Important:
# - replacement=false
# - mix_num_samples is intentionally omitted

mix_seed: 0
replacement: false

datasets:
  - name: shapenet_mesh
    cache_root: data/shapenet_cache_v0
    split: train
    backend: mesh
    weight: 0.5

  - name: shapenet_udf
    cache_root: data/shapenet_cache_v0
    split: train
    backend: udfgrid
    weight: 0.5
