dataset_version: v2

answer_schema: [n, curv, dist, grad, density]
n_qry: 1024
return_qry: true
return_ray: false

pointmae_pc_norm: true
pointmae_scale_translate: true
pointmae_scale_low: 0.6666667
pointmae_scale_high: 1.5
pointmae_translate: 0.2
transform_answers: true

# Default policy: keep total samples per epoch fixed to full ShapeNet-train size
# regardless of composition ratio.
# NOTE: 47445 comes from split metadata
# (train_pc=15655, train_mesh=16127, train_udf=15663).
replacement: true
mix_num_samples: 47445

datasets:
  - name: shapenet_udf
    cache_root: data/shapenet_unpaired_cache_v2_20260303_drop1
    split: train_udf
    backend: udf
    weight: 1.0
    surf_xyz_key: surf_xyz
    qry_xyz_key: udf_qry_xyz
