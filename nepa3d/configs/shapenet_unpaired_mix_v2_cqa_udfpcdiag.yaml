    context_source: pc_bank

  - name: udf_clearance
    cache_root: data/shapenet_unpaired_cache_v2_20260311_worldvis_drop1
    split: train_udf
    backend: udf
    weight: 1.0
    task_name: udf_clearance
    context_source: pc_bank
