dataset_version: v2

answer_schema: [n, curv, dist, grad, density]
n_qry: 1024
return_qry: true
return_ray: false

pointmae_pc_norm: true
pointmae_scale_translate: true
pointmae_scale_low: 0.6666667
pointmae_scale_high: 1.5
pointmae_translate: 0.2
transform_answers: true

# One-pass sampling per epoch; 50/50 composition is encoded by train split counts.
replacement: false

datasets:
  - name: shapenet_mesh
    cache_root: data/shapenet_unpaired_cache_v2_20260303_drop1
    split: train_mesh
    backend: mesh
    weight: 1.0
    surf_xyz_key: surf_xyz
    qry_xyz_key: mesh_qry_xyz

  - name: shapenet_udf
    cache_root: data/shapenet_unpaired_cache_v2_20260303_drop1
    split: train_udf
    backend: udf
    weight: 1.0
    surf_xyz_key: surf_xyz
    qry_xyz_key: udf_qry_xyz
