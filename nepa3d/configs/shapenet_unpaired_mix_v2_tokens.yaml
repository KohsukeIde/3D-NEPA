# Example mix config for v2 token-based PatchNEPA pretraining.
#
# This assumes you have created a v2 ShapeNet cache (one NPZ per shape containing
# surf_xyz + {mesh_qry_*, udf_qry_*, pc_qry_*}) and then created an unpaired split
# into train_mesh / train_udf / train_pc using shapenet_unpaired_split.py.

dataset_version: v2

# Unified answer schema across all primitives (dims must match across the mix).
# Missing fields for a given primitive are automatically zero-filled.
answer_schema: [n, curv, dist, grad, density]

# Fixed #queries per sample (must be constant across the mixed batch).
# Each primitive-specific query set will be subsampled to this size.
n_qry: 1024

# We usually do NOT return rays for the basic point-query pretrain.
return_qry: true
return_ray: false

# Point-MAE compatibility (can be overridden by CLI).
pointmae_pc_norm: true
pointmae_scale_translate: true
pointmae_scale_low: 0.6666667
pointmae_scale_high: 1.5
pointmae_translate: 0.2
transform_answers: true

# Datasets
# - All datasets point at the SAME cache_root but different splits.
# - v2-specific selection is done via per-spec surf_xyz_key and qry_xyz_key.

datasets:
  - name: shapenet_mesh
    cache_root: /path/to/shapenet_v2_unpaired
    split: train_mesh
    backend: mesh
    weight: 1.0
    surf_xyz_key: surf_xyz
    qry_xyz_key: mesh_qry_xyz

  - name: shapenet_udf
    cache_root: /path/to/shapenet_v2_unpaired
    split: train_udf
    backend: udf
    weight: 1.0
    surf_xyz_key: surf_xyz
    qry_xyz_key: udf_qry_xyz

  - name: shapenet_pc
    cache_root: /path/to/shapenet_v2_unpaired
    split: train_pc
    backend: pc
    weight: 1.0
    surf_xyz_key: pc_xyz
    qry_xyz_key: pc_qry_xyz
