dataset_version: v2

# Queryless baseline for qa_tokens=0 (plain next-patch prediction).
return_qry: false
return_ray: false
return_pt_ans: false

pointmae_pc_norm: true
pointmae_scale_translate: true
pointmae_scale_low: 0.6666667
pointmae_scale_high: 1.5
pointmae_translate: 0.2
transform_answers: true

replacement: false

datasets:
  - name: shapenet_pc
    cache_root: data/shapenet_unpaired_cache_v2_20260303_drop1
    split: train_pc
    backend: pc
    weight: 1.0
    surf_xyz_key: pc_xyz
